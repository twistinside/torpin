name: Deploy Backend v2 Prod

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to deploy
        required: true
        default: main

env:
  SWIFT_VERSION: '6.2.1'

jobs:
  deploy:
    runs-on: ubuntu-24.04-arm
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.git_ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Set up Swift
        uses: swift-actions/setup-swift@v3
        with:
          skip-verify-signature: true
          swift-version: ${{ env.SWIFT_VERSION }}

      - name: Cache Swift Lambda v2 archive
        id: lambda-v2-cache
        uses: actions/cache@v6
        with:
          path: lambda-v2/.build/plugins/AWSLambdaPackager/outputs/AWSLambdaPackager/
          key: swift-lambda-v2-zip-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lambda-v2/Package.resolved', 'lambda-v2/Sources/**', 'lambda-v2/Package.swift') }}
          restore-keys: |
            swift-lambda-v2-zip-${{ runner.os }}-${{ runner.arch }}-

      - name: Test Swift Lambda v2
        working-directory: ./lambda-v2
        run: swift test

      - name: Package Swift Lambda v2
        if: steps.lambda-v2-cache.outputs.cache-hit != 'true'
        working-directory: ./lambda-v2
        run: DOCKER_DEFAULT_PLATFORM=linux/arm64 swift package --disable-sandbox --allow-network-connections docker archive --disable-docker-image-update --products EventHandlerV2Lambda

      - name: Create placeholder legacy Lambda artifacts
        run: |
          mkdir -p lambda/.build/plugins/AWSLambdaPackager/outputs/AWSLambdaPackager/TorpinServiceLambda
          mkdir -p lambda/.build/plugins/AWSLambdaPackager/outputs/AWSLambdaPackager/EventHandlerLambda
          echo 'placeholder' > lambda/placeholder.txt
          zip -qj lambda/.build/plugins/AWSLambdaPackager/outputs/AWSLambdaPackager/TorpinServiceLambda/TorpinServiceLambda.zip lambda/placeholder.txt
          zip -qj lambda/.build/plugins/AWSLambdaPackager/outputs/AWSLambdaPackager/EventHandlerLambda/EventHandlerLambda.zip lambda/placeholder.txt
          rm lambda/placeholder.txt

      - name: Cache CDK node_modules
        uses: actions/cache@v6
        with:
          path: cdk/node_modules
          key: cdk-node-modules-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('cdk/package-lock.json') }}
          restore-keys: |
            cdk-node-modules-${{ runner.os }}-${{ runner.arch }}-

      - name: Install CDK dependencies
        working-directory: ./cdk
        run: npm ci

      - name: Install CDK globally
        run: npm install -g aws-cdk

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-1

      - name: Bootstrap CDK
        working-directory: ./cdk
        run: node node_modules/aws-cdk/bin/cdk bootstrap

      - name: Deploy v2 prod stack
        env:
          CLOUDFRONT_CERTIFICATE_ARN: ${{ secrets.CLOUDFRONT_CERTIFICATE_ARN }}
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
          STEAM_ID: ${{ secrets.STEAM_ID }}
        working-directory: ./cdk
        run: node node_modules/aws-cdk/bin/cdk deploy TorpinV2ProdStack --require-approval never --outputs-file cdk-outputs.json

      - name: Summarize v2 prod deployment
        working-directory: ./cdk
        run: |
          node <<'NODE'
          const fs = require('fs');
          const outputs = JSON.parse(fs.readFileSync('cdk-outputs.json', 'utf8')).TorpinV2ProdStack;
          const summary = [
            '## v2 Prod',
            `- API URL: ${outputs.ApiUrl}`,
            `- Distribution: ${outputs.DistributionDomainName}`,
            `- Table: ${outputs.TableName}`,
            `- Event Handler Lambda: ${outputs.EventHandlerFunctionName}`,
            `- Status Cache Bucket: ${outputs.StatusCacheBucketName}`,
            '',
          ].join('\n');
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${summary}\n`);
          NODE

      - name: Smoke test v2 prod API
        working-directory: ./cdk
        run: |
          PROD_URL=$(node -e "const fs = require('fs'); const outputs = JSON.parse(fs.readFileSync('cdk-outputs.json', 'utf8')).TorpinV2ProdStack; process.stdout.write(outputs.ApiUrl);")
          EVENT_HANDLER=$(node -e "const fs = require('fs'); const outputs = JSON.parse(fs.readFileSync('cdk-outputs.json', 'utf8')).TorpinV2ProdStack; process.stdout.write(outputs.EventHandlerFunctionName);")
          aws lambda invoke \
            --function-name "$EVENT_HANDLER" \
            --cli-binary-format raw-in-base64-out \
            --payload '{"version":"0","id":"smoke-test","detail-type":"Scheduled Event","source":"aws.events","account":"","time":"2026-01-01T00:00:00Z","region":"us-west-1","resources":[],"detail":{}}' \
            /tmp/torpin-v2-prod-event-handler.json
          sleep 10
          RESPONSE=$(curl --fail --silent --show-error "$PROD_URL")
          RESPONSE="$RESPONSE" node -e "const body = JSON.parse(process.env.RESPONSE); const keys = Object.keys(body).sort(); if (keys.length !== 1 || keys[0] !== 'isBrianTorpin') process.exit(1); if (typeof body.isBrianTorpin !== 'boolean') process.exit(1);"

      - name: Notify via Pushover
        if: ${{ always() }}
        env:
          JOB_STATUS: ${{ job.status }}
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
        working-directory: ./cdk
        run: |
          if [ -z "${PUSHOVER_TOKEN}" ] || [ -z "${PUSHOVER_USER}" ]; then
            echo "Pushover secrets are not configured; skipping notification."
            exit 0
          fi
          short_sha="$(git rev-parse --short=8 HEAD)"
          api_url=""
          if [ -f cdk-outputs.json ]; then
            api_url=$(node -e "const fs = require('fs'); const outputs = JSON.parse(fs.readFileSync('cdk-outputs.json', 'utf8')).TorpinV2ProdStack; process.stdout.write(outputs?.ApiUrl ?? '')")
          fi
          if [ "${JOB_STATUS}" = "success" ]; then
            title="Torpin v2 prod deployment"
            if [ -n "${api_url}" ]; then
              message="Deployment complete. ${api_url} is now at ${short_sha}."
            else
              message="Deployment complete. Prod is now at ${short_sha}."
            fi
          else
            title="Torpin v2 prod deployment failed"
            message="Deployment failed for ${short_sha}. Check logs."
          fi
          curl -s \
            --form-string "token=${PUSHOVER_TOKEN}" \
            --form-string "user=${PUSHOVER_USER}" \
            --form-string "title=${title}" \
            --form-string "message=${message}" \
            https://api.pushover.net/1/messages.json
